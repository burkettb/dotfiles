# Enhanced tmux config for nested sessions on servers

# All settings from minimal config
set -g mouse on
set -g base-index 1
set -s escape-time 0

# NESTED TMUX HANDLING
# Use Ctrl+b as prefix on remote (different from local Ctrl+a)
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Visual indicator that we're in a nested session
set -g status-position top
set -g status-style bg=colour17,fg=colour27
set -g status-left '#[fg=colour231,bg=colour27,bold] REMOTE: #S '
set -g status-right '#[fg=colour231,bg=colour27] #H | %H:%M '

# Double-tap Ctrl+b to send commands to local tmux
bind C-b send-prefix

# Easy splits
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick escape to send commands to outer tmux
# Press Ctrl+b, then Shift+U to control outer tmux
bind -n C-Up \
  set -g prefix None \; \
  set -g status-style bg=colour52,fg=colour196 \; \
  set -g status-left '#[fg=colour231,bg=colour196,bold] DISABLED - Controlling LOCAL '

bind -n C-Down \
  set -g prefix C-b \; \
  set -g status-style bg=colour17,fg=colour27 \; \
  set -g status-left '#[fg=colour231,bg=colour27,bold] REMOTE: #S '