"/Users/brandon/.aws" = "deny"
"/Users/brandon/.gnupg" = "deny"
"/Users/brandon/.kube" = "deny"
"/Users/brandon/.config/gcloud" = "deny"
"/Users/brandon/.config/gh/hosts.yml" = "deny"
"/Users/brandon/.docker/config.json" = "deny"
"/Users/brandon/Library/Keychains" = "deny"

[permissions.safe-workspace.filesystem.":workspace_roots"]
"**/.env" = "deny"
"**/.env.*" = "deny"
"**/secrets/**" = "deny"
"**/.secrets/**" = "deny"
"**/credentials/**" = "deny"
"**/.npmrc" = "deny"
"**/.pypirc" = "deny"
"**/.netrc" = "deny"
"**/.git-credentials" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.p12" = "deny"
"**/*.pfx" = "deny"

