<!-- @dsCard group="Colors" viewport="700x150" name="Neutral — Slate scale" subtitle="Cool slate. Structure is colorless: text, borders, surfaces." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw { border-radius: var(--radius-control); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 56px; }
  .meta { padding: 5px 6px; font-size: 10px; }
  .name { font-weight: 600; color: var(--text-primary); }
  .hex { color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="scale" id="s"></div>
<script>
  const steps = [['50','#f8fafc'],['100','#f1f5f9'],['200','#e2e8f0'],['300','#cbd5e1'],['400','#94a3b8'],['500','#64748b'],['600','#475569'],['700','#334155'],['800','#1e293b'],['900','#0f172a'],['950','#020617']];
  document.getElementById('s').innerHTML = steps.map(([n,h]) =>
    `<div class="sw"><div class="chip" style="background:${h}"></div><div class="meta"><div class="name">${n}</div><div class="hex">${h}</div></div></div>`).join('');
</script>
</body>
</html>
