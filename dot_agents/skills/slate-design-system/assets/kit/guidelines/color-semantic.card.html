<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Red / Green / Amber" subtitle="Hue encodes meaning. Tint bg + strong text; solid fill for alarming states." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; }
  .cell { flex: 1; }
  .chip { padding: 10px 12px; border-radius: var(--radius-control); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .cap { margin-top: 8px; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="chip" style="background:var(--danger-bg);color:var(--danger-fg)"><span class="dot" style="background:var(--danger)"></span>Error / destructive</div><div class="cap">--danger #dc2626</div></div>
  <div class="cell"><div class="chip" style="background:var(--success-bg);color:var(--success-fg)"><span class="dot" style="background:var(--success)"></span>Success / active</div><div class="cap">--success #16a34a</div></div>
  <div class="cell"><div class="chip" style="background:var(--warning-bg);color:var(--warning-fg)"><span class="dot" style="background:var(--warning)"></span>Warning / past due</div><div class="cap">--warning #d97706</div></div>
</div>
</body>
</html>
