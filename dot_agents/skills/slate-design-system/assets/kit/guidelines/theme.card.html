<!-- @dsCard group="Colors" viewport="900x560" name="Theme — Light Default, Dark Opt-In" subtitle="Toggle to preview the experimental dark token remap" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="../tokens/theme-dark.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); color: var(--text-primary); padding: 28px 36px;
    transition: background-color 150ms cubic-bezier(0.2,0,0,1); }
  .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 25px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { margin: 0; font-size: 14px; color: var(--text-secondary); max-width: 58ch; }
  .sub code { font-family: var(--font-mono); font-size: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Badge, Tag, Input, Select, Switch, Card, Alert } = window.SlateDesignSystem_59ffb3;

function Demo() {
  const [dark, setDark] = React.useState(false);
  React.useEffect(() => {
    if (dark) document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
  }, [dark]);
  return (
    <div>
      <div className="head">
        <div>
          <h1>Theme</h1>
          <p className="sub"><strong>Light is the one default.</strong> Dark ships as an opt-in token file — link <code>tokens/theme-dark.css</code> after <code>styles.css</code> and set <code>data-theme="dark"</code>. Tokens only; components are not yet audited on dark.</p>
        </div>
        <Switch label={dark ? 'Dark' : 'Light'} checked={dark} onChange={() => setDark(!dark)} />
      </div>
      <div className="grid">
        <div className="stack">
          <div>
            <div className="lbl">Actions</div>
            <div className="row">
              <Button variant="primary">Create Invoice</Button>
              <Button variant="secondary">Cancel</Button>
              <Button variant="ghost">View All</Button>
            </div>
          </div>
          <div>
            <div className="lbl">Status &amp; Category</div>
            <div className="row">
              <Badge tone="success">Active</Badge>
              <Badge tone="warning">Past Due</Badge>
              <Badge tone="danger">Suspended</Badge>
              <Tag hue="blue">Product</Tag>
              <Tag hue="violet">Design</Tag>
            </div>
          </div>
          <Alert tone="info" title="Reminder Scheduled">Northwind Traders will be emailed tomorrow at 9:00.</Alert>
        </div>
        <div className="stack">
          <Card title="Payment Details">
            <div className="stack" style={{ gap: 12 }}>
              <Input label="Amount (USD)" placeholder="0.00" />
              <Select label="Customer" placeholder="Select a customer" options={['Northwind Traders', 'Globex Corp', 'Initech']} />
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
