<!-- @dsCard group="Colors" viewport="700x170" name="Categorical palette" subtitle="≤5 hues, one stable meaning each. Tint bg + strong same-hue text." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .cell { flex: 1; text-align: center; }
  .chip { padding: 12px 8px; border-radius: var(--radius-control); font-size: 13px; font-weight: 600; }
  .cap { margin-top: 8px; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row" id="s"></div>
<script>
  const hues = [['blue','#dbeafe','#1e40af','Product'],['teal','#ccfbf1','#0f766e','Design'],['violet','#ede9fe','#6d28d9','Engineering'],['amber','#fef3c7','#b45309','Marketing'],['rose','#ffe4e6','#be123c','Sales']];
  document.getElementById('s').innerHTML = hues.map(([n,bg,fg,label]) =>
    `<div class="cell"><div class="chip" style="background:${bg};color:${fg}">${label}</div><div class="cap">--cat-${n}</div></div>`).join('');
</script>
</body>
</html>
