<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Blue" subtitle="One bold blue carries all emphasis. #1d4ed8 is the accent value." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-control); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; position: relative; }
  .tag { position: absolute; top: 6px; left: 8px; font-size: 10px; font-weight: 600; color: #fff; background: rgba(0,0,0,0.25); padding: 2px 5px; border-radius: 3px; }
  .meta { padding: 6px 8px; font-size: 10px; }
  .name { font-weight: 600; color: var(--text-primary); }
  .hex { color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row" id="s"></div>
<script>
  const steps = [['50','#eff6ff',''],['100','#dbeafe',''],['200','#bfdbfe',''],['500','#3b82f6',''],['600','#2563eb','focus ring'],['700','#1d4ed8','accent'],['800','#1e40af','hover']];
  document.getElementById('s').innerHTML = steps.map(([n,h,t]) =>
    `<div class="sw"><div class="chip" style="background:${h}">${t?`<span class="tag">${t}</span>`:''}</div><div class="meta"><div class="name">blue-${n}</div><div class="hex">${h}</div></div></div>`).join('');
</script>
</body>
</html>
