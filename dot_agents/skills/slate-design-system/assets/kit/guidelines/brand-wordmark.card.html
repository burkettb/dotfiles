<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="No supplied logo — the name is set in Geist. See readme.md." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .name { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
  .name .dot { color: var(--accent); }
  .note { margin-top: 18px; font-size: 12px; color: var(--text-muted); max-width: 60ch; line-height: 1.5; }
  .name-alt { margin-top: 16px; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: #fff; background: var(--slate-900); display: inline-block; padding: 6px 14px; border-radius: var(--radius-control); }
</style>
</head>
<body>
  <div class="name">Slate<span class="dot">.</span></div>
  <span class="name-alt">Slate<span style="color:var(--blue-200)">.</span></span>
  <p class="note">No brand logo was supplied. Per house policy the product name is set in plain type (Geist Bold) wherever a mark would go — a single accent period is the only flourish. Replace with a real logo when available; see readme.md.</p>
</body>
</html>
