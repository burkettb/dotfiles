<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale — 4 / 8" subtitle="Strict 4/8 scale. No arbitrary one-off margins." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .rows { display: flex; flex-direction: column; gap: 7px; }
  .r { display: flex; align-items: center; gap: 12px; font-size: 11px; }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
  .tok { font-family: var(--font-mono); color: var(--text-secondary); width: 96px; }
  .px { color: var(--text-muted); }
</style>
</head>
<body>
<div class="rows" id="s"></div>
<script>
  const steps = [['1',4],['2',8],['3',12],['4',16],['5',20],['6',24],['8',32],['10',40],['12',48]];
  document.getElementById('s').innerHTML = steps.map(([n,px]) =>
    `<div class="r"><span class="tok">--space-${n}</span><span class="bar" style="width:${px}px"></span><span class="px">${px}px</span></div>`).join('');
</script>
</body>
</html>
