<!-- @dsCard group="Foundations" viewport="700x150" name="Motion & focus" subtitle="Restrained, choreographed. 150/300/450ms. Focus rings designed like hovers." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 32px; align-items: center; }
  .grp { }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .durs { display: flex; gap: 10px; }
  .dur { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); background: var(--surface-muted); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; }
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: #fff; background: var(--accent); border: none; padding: 8px 16px; border-radius: 4px; box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--focus-ring); }
</style>
</head>
<body>
<div class="row">
  <div class="grp">
    <div class="lbl">Durations</div>
    <div class="durs"><span class="dur">fast 150ms</span><span class="dur">base 300ms</span><span class="dur">slow 450ms</span></div>
  </div>
  <div class="grp">
    <div class="lbl">Focus ring</div>
    <button class="btn">Create Invoice</button>
  </div>
</div>
</body>
</html>
