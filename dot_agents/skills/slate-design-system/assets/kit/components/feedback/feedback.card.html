<!DOCTYPE html>

<style>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Dialog, Tooltip, Button, IconButton, Input } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    return (
      <div className="row" style={{ alignItems: 'flex-start' }}>
        <div style={{ flex: 1 }}>
          <Dialog
            open={true}
            title="Invite Teammate"
            description="They'll get an email with a link to join Acme."

              <Button variant="ghost">Cancel</Button>
              <Button variant="primary">Send Invite</Button>

            <Input label="Email address" type="email" placeholder="teammate@company.com" />

          <Tooltip label="Duplicate"><IconButton icon="document-duplicate" label="Duplicate" outline /></Tooltip>

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
