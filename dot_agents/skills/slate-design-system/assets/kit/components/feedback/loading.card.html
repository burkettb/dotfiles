<!-- @dsCard group="Components" viewport="760x300" name="Loading — Spinner, Progress & Popover" subtitle="Indeterminate + determinate waits, floating panels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 200px 1fr; gap: 32px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 20px; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  .spinners { display: flex; align-items: center; gap: 16px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Spinner, Progress, Popover, Button, Select } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    return (
      <div className="grid">
        <div className="col">
          <div>
            <div className="lbl">Spinner</div>
            <div className="spinners">
              <Spinner size="sm" /><Spinner /><Spinner size="lg" />
            </div>
          </div>
          <div>
            <div className="lbl">Popover</div>
            <Popover trigger={<Button variant="secondary">Filters</Button>}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <Select label="Status" options={['All', 'Paid', 'Overdue']} />
                <Button variant="primary" size="sm">Apply</Button>
              </div>
            </Popover>
          </div>
        </div>
        <div className="col">
          <div className="lbl" style={{ marginBottom: -8 }}>Progress</div>
          <Progress label="Uploading invoice.pdf" value={64} showValue />
          <Progress label="Import complete" value={100} tone="success" showValue />
          <Progress label="Storage used" value={92} tone="danger" showValue />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
