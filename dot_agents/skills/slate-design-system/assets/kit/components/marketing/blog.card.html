<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body { margin: 0; background: var(--surface-page); } .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1040px; margin: 0 auto; padding: 48px 32px; } .art { border-top: 1px solid var(--border); }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { BlogCard, ArticleLayout, ImagePlaceholder } = window.SlateDesignSystem_59ffb3;
function Demo() {
  return (
    <div>
      <div className="grid">
        <BlogCard media={<ImagePlaceholder label="post cover" ratio="16/9" radius="0" />} tag="Collections" tagHue="blue"
          title="The reminder schedule that gets invoices paid in 12 days" excerpt="We analyzed 2.1M reminders. Timing beats tone — here's the schedule that wins."
          author="Priya Nair" date="Jul 2, 2026" readTime="6 min" />
        <BlogCard media={<ImagePlaceholder label="post cover" ratio="16/9" radius="0" />} tag="Product" tagHue="teal"
          title="Auto-reconcile is out of beta" excerpt="Bank feeds match invoices themselves now. Here's what changed and what's next."
          author="Kai Okafor" date="Jun 24, 2026" readTime="4 min" />
        <BlogCard media={<ImagePlaceholder label="post cover" ratio="16/9" radius="0" />} tag="Finance" tagHue="violet"
          title="A founder's guide to net-30 that actually nets 30" excerpt="Terms are a negotiation. Set them like one — templates included."
          author="Sofia Reyes" date="Jun 12, 2026" readTime="9 min" />
      </div>
      <div className="art">
        <ArticleLayout eyebrow="Collections" title="The reminder schedule that gets invoices paid in 12 days"
          lead="We analyzed 2.1 million reminders across 4,200 companies. The pattern is unambiguous: timing beats tone."
          author="Priya Nair" role="Head of Finance" date="Jul 2, 2026" readTime="6 min read"
          hero={<ImagePlaceholder label="article hero chart" ratio="21/9" />}>
          <h2>Day 0 matters more than day 30</h2>
          <p>The single strongest predictor of on-time payment is whether the invoice arrived with everything the payer needs: PO number, remittance details, and a payment link that works on a phone.</p>
          <blockquote>Companies that front-load the invoice cut their median days-to-payment by 9 days before sending a single reminder.</blockquote>
          <h3>The schedule</h3>
          <ul>
            <li>3 days before due — a receipt-style heads-up</li>
            <li>Due date — short, factual, with the payment link</li>
            <li>7 days over — firmer, cc the requester</li>
          </ul>
          <p>Every step stops automatically the moment payment lands. Nobody gets a reminder for an invoice they already paid.</p>
        </ArticleLayout>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
