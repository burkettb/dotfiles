<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jordan Vasquez — Portfolio Sample</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; }
  .nav__logo { font-family: var(--font-mono); font-size: 14px; color: var(--text-primary); text-decoration: none; }
  .nav__links { display: flex; gap: 24px; }
  .nav__links a { font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; }
  .nav__links a:hover { color: var(--text-primary); }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 0 48px; }
  .intro { padding: 96px 0 80px; }
  .intro h1 { margin: 0; font-size: var(--pf-display-size); font-weight: 800; letter-spacing: -0.02em; line-height: 1.02; max-width: 16ch; text-wrap: balance; }
  .intro p { margin: 28px 0 0; font-size: 19px; color: var(--text-secondary); max-width: 46ch; line-height: 1.55; }
  .sec { padding: 80px 0; border-top: 1px solid var(--border); }
  .sec > h2 { margin: 0 0 40px; font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 500; }
  .footer { border-top: 1px solid var(--border); padding: 24px 48px 48px; display: flex; justify-content: space-between; }
  .footer span { font-size: 13px; color: var(--text-muted); }
  a { color: var(--link); } a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ProjectTiles, AboutBio, SkillsList, ExperienceTimeline, ContactSection, GalleryLightbox, ImagePlaceholder } = window.SlateDesignSystem_59ffb3;

function App() {
  return (
    <div>
      <nav className="nav">
        <a className="nav__logo" href="#">jordan.vasquez</a>
        <div className="nav__links"><a href="#work">Work</a><a href="#about">About</a><a href="#contact">Contact</a></div>
      </nav>

      <div className="wrap">
        <header className="intro">
          <h1>Software for people who handle money all day.</h1>
          <p>I'm Jordan Vasquez — a designer-engineer in Oakland. I've spent ten years making fintech and B2B tools less painful, and I still get a kick out of watching someone's shoulders drop when the new flow just works.</p>
        </header>

        <section className="sec" id="work">
          <h2>Selected work</h2>
          <ProjectTiles items={[
            { title: 'Meridian Banking', summary: 'Loan approval redesign — from 9 days of paperwork to a 36-hour decision.', meta: 'Web app · 2025–26', tags: ['Fintech'], tagHue: 'blue' },
            { title: 'Atlas Design System', summary: 'One visual language for 11 product teams that used to ship 11 different blues.', meta: 'Systems · 2024', tags: ['Systems'], tagHue: 'violet' },
            { title: 'Fieldnotes', summary: 'A side-project research repository that made old learnings searchable.', meta: 'Web app · 2024', tags: ['Side project'], tagHue: 'teal' },
            { title: 'Cargo Logistics', summary: 'A dispatch dashboard drivers actually keep open. Still shipping, five years on.', meta: 'Dashboard · 2023', tags: ['B2B'], tagHue: 'amber' },
          ]} />
        </section>

        <section className="sec" id="about">
          <h2>About</h2>
          <AboutBio name="Jordan Vasquez" portrait={<ImagePlaceholder label="portrait" ratio="4/5" />}
            intro="Interfaces people trust with their money.">
            <p>I like problems where the interface is the product and a wrong decision costs someone real money. The rest of the time I'm sketching flows I'll never ship, rebuilding my note system again, or teaching my kid to solder.</p>
          </AboutBio>
          <div style={{ marginTop: 64 }}>
            <SkillsList groups={[
              { label: 'Now', items: ['Meridian lending platform', 'A CI menu bar app', 'Learning Swift properly'] },
              { label: 'Tools I Reach For', items: ['Figma + real prototypes', 'React', 'Design tokens'] },
              { label: 'Off Hours', items: ['Field recording', 'Bike maintenance', 'Teaching design 101'] },
            ]} />
          </div>
        </section>

        <section className="sec">
          <h2>Experience</h2>
          <ExperienceTimeline items={[
            { period: '2024 — now', title: 'Lead Product Designer', place: 'Meridian', note: 'Lending platform: approval time cut from 9 days to 36 hours.' },
            { period: '2020 — 24', title: 'Senior Designer', place: 'Atlas', note: 'Built and ran the design system used by 11 product teams.' },
            { period: '2016 — 20', title: 'Product Designer', place: 'Cargo', note: 'First designer. Shipped the dispatch dashboard still in use today.' },
          ]} />
        </section>

        <section className="sec">
          <h2>Process, in pictures</h2>
          <GalleryLightbox items={[
            { label: 'research wall' }, { label: 'flow sketches' }, { label: 'prototype v3' },
          ]} />
        </section>

        <section className="sec" id="contact" style={{ borderBottom: 'none', paddingBottom: 0 }}>
          <ContactSection email="jordan@vasquez.design"
            links={[{ label: 'LinkedIn' }, { label: 'GitHub' }, { label: 'Read.cv' }]}
            note="Booking projects for Q4 2026." />
        </section>
      </div>

      <footer className="footer">
        <span>Sample portfolio home composed from the Portfolio category</span>
        <span>© 2026</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
