<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body { margin: 0; background: var(--surface-page); } .wrap { max-width: 880px; margin: 0 auto; padding: 0 40px 64px; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { CaseStudyHero, CaseStudySection, GalleryLightbox, ImagePlaceholder } = window.SlateDesignSystem_59ffb3;
function Demo() {
  return (
    <div className="wrap">
      <CaseStudyHero eyebrow="Case study · Meridian Banking"
        title="Cutting loan approval from 9 days to 36 hours"
        summary="Meridian's underwriters were re-keying the same application data into four systems. We rebuilt the flow around a single review surface."
        facts={[
          { label: 'Role', value: 'Lead product designer' },
          { label: 'Timeline', value: 'Aug 2025 – Feb 2026' },
          { label: 'Outcome', value: '−83% approval time' },
        ]}
        cover={<ImagePlaceholder label="cover — final review surface" ratio="21/9" />} />
      <CaseStudySection kind="problem" index="01" title="Problem">
        <p>Four systems, one application. Underwriters spent <strong>62% of review time</strong> on data entry, not judgment. Errors compounded: a third of rejections were traced to transcription mistakes, not credit risk.</p>
      </CaseStudySection>
      <CaseStudySection kind="solution" index="02" title="Solution"
        media={<ImagePlaceholder label="screenshot — unified review queue" ratio="16/9" />}>
        <p>One review surface that pulls every source into a single decision screen. Documents on the left, extracted figures on the right, discrepancies flagged inline. The underwriter confirms instead of typing.</p>
      </CaseStudySection>
      <CaseStudySection kind="outcome" index="03" title="Outcome">
        <p>Median approval fell from <strong>9 days to 36 hours</strong>. Transcription rejections dropped to zero within the first quarter. The bank reassigned four full-time data-entry roles to customer-facing work.</p>
      </CaseStudySection>
      <GalleryLightbox items={[
        { label: 'queue view' }, { label: 'document compare' }, { label: 'decision screen' },
        { label: 'mobile approvals' }, { label: 'audit trail' }, { label: 'design system detail' },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
