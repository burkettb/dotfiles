<!-- @dsCard group="Tool" viewport="960x720" name="Tool Controls" subtitle="Sliders, steppers, file dropzone with progress & error states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-muted); padding: 32px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 880px; margin: 0 auto; }
  .panel { background: var(--surface-card); border: 1px solid var(--border); border-radius: 6px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { RangeSlider, Stepper, FileDropzone } = window.SlateDesignSystem_59ffb3;
function Demo() {
  const [amount, setAmount] = React.useState(320000);
  const [rate, setRate] = React.useState(6.4);
  const [years, setYears] = React.useState(30);
  const [qty, setQty] = React.useState(2);
  return (
    <div className="grid">
      <div className="panel">
        <span className="lbl">Sliders & steppers</span>
        <RangeSlider label="Loan amount" value={amount} onChange={setAmount} min={50000} max={1500000} step={5000}
          format={(v) => '$' + v.toLocaleString()} />
        <RangeSlider label="Interest rate" value={rate} onChange={setRate} min={2} max={12} step={0.1} unit="%" />
        <div style={{ display: 'flex', gap: 24 }}>
          <Stepper label="Term" value={years} onChange={setYears} min={5} max={40} step={5} unit="yrs" />
          <Stepper label="Applicants" value={qty} onChange={setQty} min={1} max={4} />
        </div>
      </div>
      <div className="panel">
        <span className="lbl">Dropzone — idle / uploading / done / error</span>
        <FileDropzone hint="CSV up to 10 MB" accept=".csv" />
        <FileDropzone status="uploading" progress={64} file="statements-q2.csv" />
        <FileDropzone status="done" file="statements-q1.csv" />
        <FileDropzone status="error" file="statements-2024.xlsx" error="Only .csv files are supported. Export from Excel first." />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
