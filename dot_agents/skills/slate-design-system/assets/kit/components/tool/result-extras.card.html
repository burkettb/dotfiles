<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body { margin: 0; background: var(--surface-muted); padding: 32px; } .col { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ResultCard, ShareExportRow, HowItWorks, RelatedToolsGrid, CopyButton } = window.SlateDesignSystem_59ffb3;
function Demo() {
  return (
    <div className="col">
      <ResultCard label="Monthly payment" value="$2,002.34" detail="$400,842 total interest over 30 years"
        actions={<CopyButton value="$2,002.34" label="Copy result" />} />
      <ShareExportRow items={[
        { label: 'Copy link', icon: 'clipboard' },
        { label: 'Download CSV', icon: 'arrow-down-tray' },
        { label: 'Open in Sheets', icon: 'arrow-up-right' },
      ]} />
      <HowItWorks defaultOpen>
        <p>Payments follow the standard amortization formula: <code>M = P · r(1+r)ⁿ / ((1+r)ⁿ − 1)</code>, where <code>r</code> is the monthly rate and <code>n</code> the number of payments.</p>
        <p>Everything runs in your browser — nothing is uploaded or stored.</p>
      </HowItWorks>
      <RelatedToolsGrid items={[
        { name: 'Refinance Break-even', desc: 'When does a lower rate pay off?', icon: 'arrow-path' },
        { name: 'Rent vs. Buy', desc: 'Side-by-side 10-year cost', icon: 'home' },
        { name: 'Amortization Table', desc: 'Full payment schedule as CSV', icon: 'document-text' },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
