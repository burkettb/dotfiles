<!-- @dsCard group="Dashboard" viewport="960x600" name="Dashboard Shell" subtitle="Collapsible sidebar, top bar with search & user menu, breadcrumbs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>html, body { margin: 0; height: 100%; } #root { height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { DashboardShell, TopBar, Breadcrumbs, SearchField, UserMenu, Avatar, Card } = window.SlateDesignSystem_59ffb3;
function Demo() {
  const [view, setView] = React.useState('overview');
  const nav = [
    { key: 'overview', label: 'Overview', icon: 'home', active: view === 'overview' },
    { key: 'invoices', label: 'Invoices', icon: 'document-text', active: view === 'invoices', badge: 3 },
    { key: 'customers', label: 'Customers', icon: 'users', active: view === 'customers' },
    { section: 'Workspace' },
    { key: 'settings', label: 'Settings', icon: 'cog-6-tooth', active: view === 'settings' },
  ];
  return (
    <DashboardShell logo="Slate." nav={nav} onNavigate={(it) => it.key && setView(it.key)}
      sidebarFooter={<div style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)' }}>v2.4 · Pro plan</div>}
      topBar={<TopBar
        breadcrumbs={<Breadcrumbs items={[{ label: 'Slate' }, { label: 'Overview' }]} />}
        search={<SearchField placeholder="Search…" width={220} />}
        user={<UserMenu name="Dana Ruiz" email="dana@slate.co" avatar={<Avatar name="Dana Ruiz" size="sm" status="online" />}
          items={[{ label: 'Profile', icon: 'users' }, { divider: true }, { label: 'Sign out', icon: 'arrow-right-on-rectangle' }]} />} />}>
      <Card title="Content region" description="Sidebar collapses via the chevron in the brand row.">
        Page content renders here on the muted surface.
      </Card>
    </DashboardShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
