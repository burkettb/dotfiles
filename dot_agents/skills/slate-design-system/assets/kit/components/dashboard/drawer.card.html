<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Drawer, DrawerField, Button, Badge, Avatar, Alert } = window.SlateDesignSystem_59ffb3;
function Demo() {
  const [open, setOpen] = React.useState(true);
  return (
    <div>
      <Button variant="secondary" onClick={() => setOpen(true)}>Open Drawer</Button>
      <Drawer open={open} onClose={() => setOpen(false)} title="INV-1040" description="Globex"
        footer={<React.Fragment><Button variant="ghost" onClick={() => setOpen(false)}>Close</Button><Button variant="primary" leadingIcon="paper-airplane">Send Reminder</Button></React.Fragment>}>
        <div style={{ marginBottom: 20 }}><Alert tone="danger" title="Overdue">This invoice was due on 2026-06-20.</Alert></div>
        <dl style={{ margin: 0 }}>
          <DrawerField label="Amount"><span className="sds-type-mono" style={{ fontWeight: 600 }}>$890.00</span></DrawerField>
          <DrawerField label="Status"><Badge tone="danger" dot>Overdue</Badge></DrawerField>
          <DrawerField label="Customer"><span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}><Avatar name="Globex" size="xs" /> Globex</span></DrawerField>
          <DrawerField label="Due date"><span className="sds-type-mono">2026-06-20</span></DrawerField>
        </dl>
      </Drawer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
