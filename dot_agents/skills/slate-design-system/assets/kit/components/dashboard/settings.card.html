<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body { margin: 0; padding: 24px; background: var(--surface-muted); } .wrap { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 4px 28px 28px; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { SettingsSection, DangerZone, DangerRow, Input, Select, Switch, Button } = window.SlateDesignSystem_59ffb3;
function Demo() {
  return (
    <div className="wrap">
      <SettingsSection title="Workspace" description="How your organization appears on invoices and receipts."
        footer={<Button variant="primary">Save Changes</Button>}>
        <Input label="Workspace name" defaultValue="Slate Billing" />
        <Input label="Billing email" type="email" defaultValue="billing@slate.co" helpText="Receipts and dunning notices are sent here." />
        <Select label="Default currency" options={['USD — US Dollar', 'EUR — Euro', 'GBP — Pound']} />
      </SettingsSection>
      <SettingsSection title="Notifications" description="Choose what Slate emails your team about.">
        <Switch label="Invoice paid" defaultChecked />
        <Switch label="Weekly summary" helpText="A Monday-morning digest of collections." />
      </SettingsSection>
      <DangerZone>
        <DangerRow title="Delete workspace" description="Permanently delete this workspace, its invoices, and customer data. This cannot be undone."
          action={<Button variant="danger" size="sm" leadingIcon="trash">Delete Workspace</Button>} />
      </DangerZone>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
