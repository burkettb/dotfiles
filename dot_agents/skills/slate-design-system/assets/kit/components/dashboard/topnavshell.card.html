<!-- @dsCard group="Dashboard" viewport="1100x560" name="Top-Nav Shell" subtitle="The preferred app frame — horizontal nav, centered content" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100vh; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TopNavShell, Button, StatCard, UserMenu, Avatar } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    const [active, setActive] = React.useState('Overview');
    return (
      <TopNavShell
        logo="Slate."
        nav={['Overview', 'Invoices', 'Customers', 'Settings'].map((label) => ({
          label, active: active === label, badge: label === 'Invoices' ? 12 : undefined,
        }))}
        onNavigate={(item) => setActive(item.label)}
        actions={<Button variant="primary" size="sm" leadingIcon="plus">New Invoice</Button>}
        user={<UserMenu name="Ana Torres" avatar={<Avatar name="Ana Torres" size="sm" />} items={[{ label: 'Sign Out', icon: 'arrow-right-on-rectangle' }]} />}
      >
        <div className="cards">
          <StatCard label="Outstanding" value="$48,250" delta={{ value: -8.1 }} deltaSuffix="vs last month" />
          <StatCard label="Paid This Month" value="$132,400" delta={{ value: 12.4 }} deltaSuffix="vs last month" />
          <StatCard label="Avg Days to Payment" value="12.3" delta={{ value: -2.1, direction: 'up' }} deltaSuffix="days faster" />
        </div>
      </TopNavShell>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
