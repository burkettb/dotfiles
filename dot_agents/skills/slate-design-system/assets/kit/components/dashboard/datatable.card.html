<!-- @dsCard group="Dashboard" viewport="960x620" name="Data Table" subtitle="Sortable, filter row, selection + bulk actions, row menu, pagination, empty state" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body { margin: 0; padding: 24px; background: var(--surface-muted); } .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 20px 0 8px; } .lbl:first-child { margin-top: 0; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { DataTable, Badge, Avatar, EmptyState, Button } = window.SlateDesignSystem_59ffb3;
const money = (n) => '$' + n.toLocaleString('en-US');
const TONE = { paid: 'success', open: 'info', overdue: 'danger', draft: 'neutral' };
const ROWS = [
  { id: 'INV-1042', customer: 'Northwind Traders', amount: 12480, status: 'paid', due: '2026-07-01' },
  { id: 'INV-1041', customer: 'Acme Corp', amount: 3200, status: 'open', due: '2026-07-12' },
  { id: 'INV-1040', customer: 'Globex', amount: 890, status: 'overdue', due: '2026-06-20' },
  { id: 'INV-1039', customer: 'Soylent Inc', amount: 5400, status: 'paid', due: '2026-06-28' },
  { id: 'INV-1038', customer: 'Initech', amount: 2100, status: 'open', due: '2026-07-15' },
  { id: 'INV-1037', customer: 'Umbrella Co', amount: 18900, status: 'paid', due: '2026-06-15' },
];
const COLS = [
  { key: 'id', header: 'Invoice', sortable: true, mono: true },
  { key: 'customer', header: 'Customer', sortable: true },
  { key: 'amount', header: 'Amount', sortable: true, mono: true, render: (r) => money(r.amount), filter: false },
  { key: 'status', header: 'Status', sortable: true, render: (r) => <Badge tone={TONE[r.status]} dot>{r.status}</Badge>, filter: false },
  { key: 'due', header: 'Due', sortable: true, mono: true, align: 'right', filter: false },
];
function Demo() {
  return (
    <div>
      <div className="lbl">Full-featured — select rows for bulk bar; ⋯ for row menu</div>
      <DataTable columns={COLS} rows={ROWS} rowKey="id" selectable filterable title="Invoices" pageSize={4}
        bulkActions={[{ label: 'Send reminder', icon: 'paper-airplane' }, { label: 'Delete', icon: 'trash', danger: true }]}
        rowActions={() => [{ label: 'View details', icon: 'document-text' }, { label: 'Duplicate', icon: 'document-duplicate' }, { divider: true }, { label: 'Delete', icon: 'trash', danger: true }]} />
      <div className="lbl">Empty state</div>
      <DataTable columns={COLS} rows={[]} rowKey="id"
        emptyState={<EmptyState size="sm" icon="document-text" title="No invoices yet"
          description="Invoices you create will show up here with their status and due date."
          action={<Button variant="primary" size="sm" leadingIcon="plus">Create Invoice</Button>} />} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
