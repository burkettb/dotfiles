<!-- @dsCard group="Dashboard" viewport="960x660" name="Charts" subtitle="Line, bar, area, donut — blue-first series, slate-derived tones" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-muted); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px 20px; }
  .panel h3 { margin: 0 0 12px; font-size: var(--text-md); font-weight: var(--weight-semibold); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { LineChart, BarChart, AreaChart, DonutChart } = window.SlateDesignSystem_59ffb3;
const L = ['Feb','Mar','Apr','May','Jun','Jul'];
function Demo() {
  return (
    <div className="grid">
      <div className="panel"><h3>Line</h3>
        <LineChart labels={L} height={200} series={[{ name: 'Collected', data: [42,48,46,58,63,71] }, { name: 'Outstanding', data: [12,15,11,18,14,16] }]} />
      </div>
      <div className="panel"><h3>Bar</h3>
        <BarChart labels={L} height={200} series={[{ name: 'Paid', data: [38,41,52,49,63,72] }, { name: 'Overdue', data: [6,9,5,11,7,8] }]} />
      </div>
      <div className="panel"><h3>Area</h3>
        <AreaChart labels={L} height={200} series={[{ name: 'MRR', data: [51,55,58,64,69,78] }]} />
      </div>
      <div className="panel"><h3>Donut</h3>
        <DonutChart size={160} data={[{ label: 'Enterprise', value: 48 }, { label: 'Growth', value: 34 }, { label: 'Starter', value: 18 }]} centerValue="$84k" centerLabel="This month" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
