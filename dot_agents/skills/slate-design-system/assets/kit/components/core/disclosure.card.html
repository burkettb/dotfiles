<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; align-items: start; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  .block { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Accordion, Divider } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="lbl">Accordion</div>
          <Accordion defaultOpen={0} items={[
            { title: 'Billing Address', content: 'The address printed on every invoice you send. Changing it updates future invoices only.' },
            { title: 'Tax Settings', content: 'Set your tax registration number and default rate per region.' },
            { title: 'Payment Methods', content: 'Bank transfer and card payments are enabled by default.' },
          ]} />
        </div>
        <div>
          <div className="lbl">Divider</div>
          <div className="block">Two blocks sharing one container earn a divider.</div>
          <Divider />
          <div className="block">Sign in with your workspace email.</div>
          <Divider label="or" />
          <div className="block">Continue with single sign-on.</div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
