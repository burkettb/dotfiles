<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ridgeline Roofing — Brochure Sample</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); }
  .nav { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 40px; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .nav__logo { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); text-decoration: none; }
  .nav__phone { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text-primary); text-decoration: none; }
  .nav__phone:hover { color: var(--accent); }
  .sec { max-width: 1120px; margin: 0 auto; padding: 72px 40px; }
  .sec + .sec { border-top: 1px solid var(--border); }
  .sec__head { max-width: 560px; margin-bottom: 40px; }
  .sec__head h2 { margin: 0; font-size: 33px; font-weight: 700; letter-spacing: -0.02em; }
  .sec__head p { margin: 12px 0 0; color: var(--text-secondary); }
  .quote-sec { display: grid; grid-template-columns: 1fr 560px; gap: 64px; align-items: start; }
  .footer { border-top: 1px solid var(--border); padding: 32px 40px 72px; display: flex; justify-content: space-between; }
  .footer span { font-size: 13px; color: var(--text-muted); }
  a { color: var(--link); } a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const {
  BrochureHero, TrustStrip, ServicesGrid, ReviewCards, BeforeAfterGallery, TeamCards,
  HoursLocation, ServiceArea, QuoteForm, StickyCallButton, ImagePlaceholder, Icon
} = window.SlateDesignSystem_59ffb3;

const PHONE = '(503) 555-0119';

function App() {
  return (
    <div>
      <nav className="nav">
        <a className="nav__logo" href="#">Ridgeline Roofing</a>
        <a className="nav__phone" href="tel:+15035550119"><Icon name="phone" size={16} /> {PHONE}</a>
      </nav>

      <BrochureHero
        eyebrow="Ridgeline Roofing · Portland, OR"
        title="A roof that outlasts the mortgage."
        lead="Repairs, full replacements, and honest inspections — done by the crew that shows up when we say we will."
        phone={PHONE}
        cta="Request a Free Quote"
        onCta={() => document.getElementById('quote').scrollTo && document.getElementById('quote').focus()}
        media={<ImagePlaceholder label="photo — crew on finished roof" ratio="4/3" />}
        badges={<TrustStrip years={23} licensed rating={4.9} reviewCount={312} />} />

      <section className="sec">
        <div className="sec__head"><h2>What we do</h2><p>Three things, done well. If you need something else, we'll tell you who to call.</p></div>
        <ServicesGrid items={[
          { icon: 'home', title: 'Roof Replacement', body: 'Tear-off to final inspection in 2–3 days, weather permitting. 30-year workmanship warranty.' },
          { icon: 'bolt', title: 'Storm Repair', body: 'Emergency tarping within 24 hours; we handle the insurance paperwork.' },
          { icon: 'magnifying-glass', title: 'Inspections', body: 'A 40-point check with photos of everything we find. Free with any estimate.' },
        ]} />
      </section>

      <section className="sec">
        <div className="sec__head"><h2>Recent work</h2><p>Every job photographed before and after — ask to see the full album for your neighborhood.</p></div>
        <BeforeAfterGallery items={[
          { caption: 'Hail-damaged composite → architectural shingle', meta: 'Beaverton, 2 days' },
          { caption: 'Moss remediation + ridge vent install', meta: 'Sellwood, 1 day' },
        ]} />
      </section>

      <section className="sec">
        <div className="sec__head"><h2>What neighbors say</h2></div>
        <ReviewCards items={[
          { quote: 'They tarped our roof the same night the tree came down, then handled the whole insurance claim.', name: 'Janet M.', rating: 5, source: 'Google', meta: 'Storm repair · Sellwood' },
          { quote: 'Quote was $3k under the other two bids for the same shingle. Done in two days, spotless yard.', name: 'Dave R.', rating: 5, source: 'Yelp', meta: 'Replacement · Beaverton' },
          { quote: 'Only company that actually showed up for the estimate on time. Roof looks great a year later.', name: 'Priya S.', rating: 4.5, source: 'Google', meta: 'Repair · Hillsboro' },
        ]} />
      </section>

      <section className="sec" id="quote">
        <div className="quote-sec">
          <div>
            <div className="sec__head" style={{ marginBottom: 24 }}>
              <h2>Get your free quote</h2>
              <p>Tell us what's going on and we'll call back within one business day — usually sooner.</p>
            </div>
            <TrustStrip items={[
              { icon: 'check-circle', label: 'Free, no-pressure estimates' },
              { icon: 'shield-check', label: 'CCB #187552 · Bonded & insured' },
              { icon: 'clock', label: 'Call back within one business day' },
            ]} style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 12 }} />
          </div>
          <QuoteForm services={['Roof replacement', 'Roof repair', 'Storm / emergency', 'Inspection', 'Gutters']} />
        </div>
      </section>

      <section className="sec">
        <div className="sec__head"><h2>The crew</h2></div>
        <TeamCards items={[
          { name: 'Ray Delgado', role: 'Owner · 23 years on roofs', note: 'Started as a laborer at 19. Still climbs on every complicated job.' },
          { name: 'Sam Whitfield', role: 'Crew Lead', note: 'Runs the tear-off crew. Zero callbacks in 2025.', tags: ['GAF certified'] },
          { name: 'Maria Delgado', role: 'Office & Scheduling', note: 'The voice on the phone. Answers before the third ring.' },
        ]} />
      </section>

      <section className="sec">
        <div className="sec__head"><h2>Hours & service area</h2></div>
        <HoursLocation
          hours={[
            { day: 'Monday', open: '7:00 AM – 6:00 PM' }, { day: 'Tuesday', open: '7:00 AM – 6:00 PM' },
            { day: 'Wednesday', open: '7:00 AM – 6:00 PM' }, { day: 'Thursday', open: '7:00 AM – 6:00 PM' },
            { day: 'Friday', open: '7:00 AM – 5:00 PM' }, { day: 'Saturday', open: '8:00 AM – 12:00 PM' }, { day: 'Sunday' },
          ]}
          address={<span>4128 SE Division St<br />Portland, OR 97202</span>}
          phone={PHONE} email="hello@ridgelineroofing.com" />
        <div style={{ marginTop: 24 }}>
          <ServiceArea
            areas={['Portland', 'Beaverton', 'Hillsboro', 'Tigard', 'Lake Oswego', 'Milwaukie', 'Gresham', 'Oregon City', 'Vancouver, WA']}
            note="Not sure if we cover you? Call — we'll tell you in 30 seconds." />
        </div>
      </section>

      <footer className="footer">
        <span>Ridgeline Roofing — sample homepage composed from the Brochure category</span>
        <span>CCB #187552 · © 2026</span>
      </footer>

      <StickyCallButton phone={PHONE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
