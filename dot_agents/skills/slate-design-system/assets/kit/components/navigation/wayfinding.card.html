<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .col { display: flex; flex-direction: column; gap: 28px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Menu, Breadcrumbs, Pagination, IconButton, Button } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    const [page, setPage] = React.useState(4);
    return (
      <div className="col">
        <div className="row">
          <div>
            <div className="lbl">Breadcrumbs</div>
            <Breadcrumbs items={[{ label: 'Invoices' }, { label: 'Northwind Traders' }, { label: 'INV-2041' }]} />
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Menu
              trigger={<Button variant="secondary">Workspace</Button>}
              items={[
                { label: 'Switch Workspace' },
                { label: 'Workspace Settings', icon: 'cog-6-tooth' },
                { divider: true },
                { label: 'Delete Workspace', icon: 'trash', danger: true },
              ]}
            />
            <Menu
              align="right"
              trigger={<IconButton icon="ellipsis-horizontal" label="Row actions" outline />}
              items={[{ label: 'Edit' }, { label: 'Duplicate' }, { divider: true }, { label: 'Delete', danger: true }]}
            />
          </div>
        </div>
        <div>
          <div className="lbl">Pagination</div>
          <Pagination page={page} pageCount={24} onChange={setPage} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
