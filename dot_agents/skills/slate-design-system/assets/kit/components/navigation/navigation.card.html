<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; gap: 32px; align-items: flex-start; }
  .sidebar { width: 220px; border: 1px solid var(--border); border-radius: var(--radius-card); padding: 8px; }
  .panel { flex: 1; }
  .panel-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-card) var(--radius-card); padding: 20px; color: var(--text-secondary); font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { NavItem, Tabs } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    const [tab, setTab] = React.useState('overview');
    return (
      <div className="row">
        <div className="sidebar">
          <NavItem icon="home" active>Overview</NavItem>
          <NavItem icon="document-text">Invoices</NavItem>
          <NavItem icon="users">Customers</NavItem>
          <NavItem icon="chart-bar">Reports</NavItem>
          <NavItem icon="cog-6-tooth">Settings</NavItem>
        </div>
        <div className="panel">
          <Tabs value={tab} onChange={setTab} items={[
            { value: 'overview', label: 'Overview' },
            { value: 'activity', label: 'Activity' },
            { value: 'members', label: 'Members' },
          ]} />
          <div className="panel-body">Showing the <strong>{tab}</strong> workspace.</div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
