<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .wrap { border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Table, Badge, IconButton } = window.SlateDesignSystem_59ffb3;
  function Demo() {
    const rows = [
      { id: 1, name: 'Northwind Traders', plan: 'Team', status: 'Active', tone: 'success' },
      { id: 2, name: 'Globex Corp', plan: 'Pro', status: 'Past due', tone: 'warning' },
      { id: 3, name: 'Initech', plan: 'Free', status: 'Draft', tone: 'neutral' },
    ];
    return (
      <div className="wrap">
        <Table
          rows={rows}
          columns={[
            { key: 'name', header: 'Customer' },
            { key: 'plan', header: 'Plan' },
            { key: 'status', header: 'Status', render: (r) => <Badge tone={r.tone} dot={r.tone !== 'neutral'}>{r.status}</Badge> },
            { key: 'a', header: '', align: 'right', render: () => <IconButton icon="ellipsis-horizontal" label="Row actions" size="sm" /> },
          ]}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
