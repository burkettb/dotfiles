<!-- @template name="Billing App" description="Three-pane app shell — login, dashboard overview, master–detail invoices, settings. Start here for any dashboard or internal tool." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Slate Billing — App UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100vh; }
  a { color: var(--link); text-decoration: none; }
  a:hover { color: var(--link-hover); text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="OverviewScreen.jsx"></script>
<script type="text/babel" src="InvoicesScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel">
  const { Dialog, Button, Input, Select } = window.SlateDesignSystem_59ffb3;

  function NewInvoiceDialog({ open, onClose }) {
    return (
      <Dialog open={open} onClose={onClose} title="Create Invoice"
        description="Draft a new invoice. You can send it after reviewing."
        footer={<>
          <Button variant="ghost" onClick={onClose}>Cancel</Button>
          <Button variant="primary" onClick={onClose}>Create Invoice</Button>
        </>}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Select label="Customer" placeholder="Select a customer"
            options={['Northwind Traders', 'Globex Corp', 'Initech', 'Umbrella Inc']} />
          <Input label="Amount (USD)" placeholder="0.00" />
          <Input label="Due date" type="date" defaultValue="2026-07-20" />
        </div>
      </Dialog>
    );
  }

  function App() {
    const [authed, setAuthed] = React.useState(false);
    const [screen, setScreen] = React.useState('Overview');
    const [modal, setModal] = React.useState(false);

    if (!authed) return <window.LoginScreen onLogin={() => setAuthed(true)} />;

    const titles = { Overview: 'Overview', Invoices: 'Invoices', Customers: 'Customers', Reports: 'Reports', Settings: 'Settings' };
    let body;
    if (screen === 'Invoices') body = <window.InvoicesScreen onNewInvoice={() => setModal(true)} />;
    else if (screen === 'Settings') body = <window.SettingsScreen />;
    else if (screen === 'Overview') body = <window.OverviewScreen />;
    else body = <Placeholder name={screen} />;

    const actions = (screen === 'Overview' || screen === 'Invoices')
      ? <Button variant="primary" leadingIcon="plus" onClick={() => setModal(true)}>New Invoice</Button> : null;

    return (
      <>
        <window.AppShell active={screen} onNavigate={setScreen} title={titles[screen]} actions={actions} onLogout={() => setAuthed(false)}>
          {body}
        </window.AppShell>
        <NewInvoiceDialog open={modal} onClose={() => setModal(false)} />
      </>
    );
  }

  function Placeholder({ name }) {
    return (
      <div style={{ padding: 64, textAlign: 'center', color: 'var(--text-muted)' }}>
        <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--text-secondary)' }}>{name}</div>
        <p style={{ fontSize: 14, marginTop: 6 }}>This surface isn't part of the sample kit.</p>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
